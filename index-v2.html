<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuckAI v2.0 - Pro Evolution</title>
    <link rel="icon" type="image/png" href="icon.png">
    
    <!-- CSS DE EMERGÊNCIA: FORÇA A VISIBILIDADE CONTRA BUGS -->
    <style>
        /* Garante que a barra de usuário e botões NUNCA fiquem invisíveis se houver login */
        #userInfo.user-info-bar { 
            display: flex !important; 
            visibility: visible !important; 
            opacity: 1 !important; 
        }
        .mode-section { display: none; }
        .mode-section.active-v2 { display: block !important; }
        .nav-btn { cursor: pointer !important; pointer-events: auto !important; }
        
        /* Ajuste de ID Badge */
        .id-badge-v2 {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 10px;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }
    </style>

    <link rel="stylesheet" href="style.css?v=2.2">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- MOTORES DE EVOLUÇÃO (V2) -->
    <script src="v2/pre-load.js"></script>
    <script src="v2/bridge.js"></script>
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container">
        <nav class="mode-nav">
            <button onclick="window.switchV2('gamer')" class="nav-btn active"><i class="fas fa-gamepad"></i> MODO GAMER</button>
            <button onclick="window.switchV2('student')" class="nav-btn"><i class="fas fa-graduation-cap"></i> MODO ESTUDANTE</button>
            <button onclick="window.switchV2('humanize')" class="nav-btn"><i class="fas fa-user-edit"></i> HUMANIZAR TEXTO</button>
            <button onclick="window.switchV2('projects')" class="nav-btn"><i class="fas fa-folder-open"></i> MEUS PROJETOS</button>
            <button onclick="window.switchV2('support')" class="nav-btn"><i class="fas fa-headset"></i> SUPORTE</button>
            <button id="adminPanelBtn" onclick="window.switchV2('admin')" class="nav-btn admin-only hidden"><i class="fas fa-user-shield"></i> PAINEL ADMIN</button>
        </nav>

        <header>
            <img src="https://cdn.discordapp.com/attachments/1388327970543763599/1484691361633407136/ChatGPT_Image_19_de_mar._de_2026_05_09_37_1.png" alt="BuckAI Logo" class="main-logo">
            <h1 id="logo" class="neon-text">BuckAI</h1>
            
            <!-- BARRA DE USUÁRIO (FORÇADA) -->
            <div id="userInfo" class="user-info-bar">
                <div class="user-profile-header">
                    <div class="profile-avatar-container">
                        <img id="userAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar">
                    </div>
                    <span id="welcomeUser" class="welcome-user">CARREGANDO...</span>
                    <button id="settingsBtn" class="settings-btn"><i class="fas fa-cog"></i></button>
                </div>
                <div class="user-badges">
                    <div class="credit-badge">
                        <i class="fas fa-bolt"></i> <span id="userCredits">0</span> CRÉDITOS
                    </div>
                    <button id="upgradeBtn" class="premium-badge">
                        <i class="fas fa-crown"></i> SEJA PREMIUM
                    </button>
                </div>
            </div>
            <p class="subtitle">O futuro dos scripts gamer começa aqui</p>
        </header>

        <div class="stats-container">
            <div class="stat-card">
                <span id="activeNow">1</span>
                <p>ATIVOS AGORA</p>
            </div>
            <div class="stat-card">
                <span id="totalScripts">152</span>
                <p>SCRIPTS GERADOS</p>
            </div>
            <div class="stat-card">
                <span id="totalClients">89</span>
                <p>TOTAL CLIENTES</p>
            </div>
        </div>

        <main>
            <!-- SEÇÕES (MODOS) -->
            <div id="gamerSection" class="mode-section active-v2">
                <!-- Conteúdo Gamer aqui -->
                <div class="input-card">
                    <div class="input-group">
                        <label><i class="fas fa-terminal"></i> O QUE VOCÊ QUER CRIAR?</label>
                        <textarea id="description" placeholder="Descreva o seu script..."></textarea>
                    </div>
                    <button id="generateBtn" class="neon-button">GERAR SCRIPT AGORA</button>
                </div>
            </div>

            <div id="studentSection" class="mode-section">
                <div class="input-card">
                    <textarea id="studentTask" placeholder="Qual a sua dúvida?"></textarea>
                    <button id="studyBtn" class="neon-button">OBTER RESPOSTA IA</button>
                </div>
            </div>

            <div id="humanizeSection" class="mode-section">
                <div class="input-card">
                    <textarea id="humanizeText" placeholder="Texto para humanizar..."></textarea>
                    <button id="humanizeBtn" class="neon-button">HUMANIZAR AGORA</button>
                </div>
            </div>

            <div id="supportSection" class="mode-section">
                <div class="input-card">
                    <div id="supportMessages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="supportInput" placeholder="Sua dúvida...">
                        <button id="sendSupportBtn" class="neon-button-small">ENVIAR</button>
                    </div>
                </div>
            </div>
            
            <!-- ÁREA DE RESULTADO (VS CODE DESIGN) -->
            <div id="resultArea" class="result-card hidden">
                <div class="result-header">
                    <h3><i class="fas fa-code"></i> SCRIPT GERADO</h3>
                </div>
                <div class="code-container">
                    <pre><code id="outputCode"></code></pre>
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPTS DE EMERGÊNCIA (DENTRO DO HTML PARA NÃO FALHAR) -->
    <script>
        // 1. Troca de Modos Independente
        window.switchV2 = (mode) => {
            document.querySelectorAll('.mode-section').forEach(s => s.classList.remove('active-v2'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const target = document.getElementById(mode + 'Section');
            if(target) target.classList.add('active-v2');
            
            // Ativar botão (visual)
            event.currentTarget.classList.add('active');
            console.log("Mudando para modo:", mode);
        };

        // 2. Sincronizador de Usuário (Força Bruta)
        setInterval(() => {
            const data = JSON.parse(localStorage.getItem('buckai_user_data_v3') || localStorage.getItem('buckai_user_data') || '{}');
            if (data.username) {
                document.getElementById('welcomeUser').innerHTML = `BEM-VINDO, ${data.username.toUpperCase()} <span class="id-badge-v2">${data.id}</span>`;
                document.getElementById('userCredits').textContent = data.isPremium ? "∞" : (data.credits || 0);
                if(data.isAdmin) document.getElementById('adminPanelBtn').classList.remove('hidden');
            }
        }, 1000);
    </script>

    <!-- Script Original por último (se ele travar, o de cima já resolveu) -->
    <script src="script.js?v=2.1"></script>
</body>
</html>
