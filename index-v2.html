<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuckAI v2.0 - Pro Evolution</title>
    <link rel="icon" type="image/png" href="icon.png">
    
    <!-- CSS PRO: BLINDAGEM TOTAL E DESIGN PREMIUM -->
    <style>
        :root {
            --pro-purple: #8b5cf6;
            --pro-bg: #020617;
            --pro-card: rgba(15, 23, 42, 0.9);
            --neon-glow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        body { margin: 0; background: var(--pro-bg); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* Força visibilidade contra qualquer script externo */
        #userInfo.user-info-bar { display: flex !important; visibility: visible !important; opacity: 1 !important; margin-top: 15px; }
        .mode-section { display: none; }
        .mode-section.active-v2 { display: block !important; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ID Badge Animado */
        .id-badge-v2 {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-left: 12px;
            box-shadow: var(--neon-glow);
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Stats Card Fix */
        .stat-card span { font-size: 1.8rem; font-weight: 900; color: #a78bfa; text-shadow: var(--neon-glow); }

        /* Botões Nav */
        .nav-btn { opacity: 0.6; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .nav-btn.active { opacity: 1 !important; background: rgba(139, 92, 246, 0.2) !important; border-color: var(--pro-purple) !important; box-shadow: var(--neon-glow); }
        
        .hidden { display: none !important; }
    </style>

    <link rel="stylesheet" href="style.css?v=3.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container">
        <nav class="mode-nav">
            <button onclick="switchV2('gamer', this)" class="nav-btn active"><i class="fas fa-gamepad"></i> MODO GAMER</button>
            <button onclick="switchV2('student', this)" class="nav-btn"><i class="fas fa-graduation-cap"></i> MODO ESTUDANTE</button>
            <button onclick="switchV2('humanize', this)" class="nav-btn"><i class="fas fa-user-edit"></i> HUMANIZAR TEXTO</button>
            <button onclick="switchV2('projects', this)" class="nav-btn"><i class="fas fa-folder-open"></i> MEUS PROJETOS</button>
            <button onclick="switchV2('support', this)" class="nav-btn"><i class="fas fa-headset"></i> SUPORTE</button>
            <button id="adminPanelBtn" onclick="switchV2('admin', this)" class="nav-btn admin-only hidden"><i class="fas fa-user-shield"></i> PAINEL ADMIN</button>
        </nav>

        <header>
            <img src="https://cdn.discordapp.com/attachments/1388327970543763599/1484691361633407136/ChatGPT_Image_19_de_mar._de_2026_05_09_37_1.png" alt="BuckAI Logo" class="main-logo">
            <h1 class="neon-text">BuckAI</h1>
            
            <div id="userInfo" class="user-info-bar">
                <div class="user-profile-header">
                    <div class="profile-avatar-container"><img id="userAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png"></div>
                    <span id="welcomeUser" class="welcome-user">BEM-VINDO</span>
                    <button onclick="openSettings()" class="settings-btn"><i class="fas fa-cog"></i></button>
                </div>
                <div class="user-badges">
                    <div class="credit-badge"><i class="fas fa-bolt"></i> <span id="userCredits">0</span> CRÉDITOS</div>
                    <button class="premium-badge"><i class="fas fa-crown"></i> SEJA PREMIUM</button>
                </div>
            </div>
        </header>

        <div class="stats-container">
            <div class="stat-card"><span id="activeNow">1</span><p>ATIVOS AGORA</p></div>
            <div class="stat-card"><span id="totalScripts">152</span><p>SCRIPTS GERADOS</p></div>
            <div class="stat-card"><span id="totalClients">89</span><p>TOTAL CLIENTES</p></div>
        </div>

        <main>
            <div id="gamerSection" class="mode-section active-v2">
                <div class="input-card">
                    <textarea id="description" placeholder="Descreva seu script..."></textarea>
                    <button onclick="notImplemented()" class="neon-button">GERAR SCRIPT AGORA</button>
                </div>
            </div>

            <div id="studentSection" class="mode-section">
                <div class="input-card">
                    <textarea id="studentTask" placeholder="Qual sua dúvida?"></textarea>
                    <button onclick="notImplemented()" class="neon-button">OBTER RESPOSTA IA</button>
                </div>
            </div>

            <div id="humanizeSection" class="mode-section">
                <div class="input-card">
                    <textarea id="humanizeText" placeholder="Texto para humanizar..."></textarea>
                    <button onclick="notImplemented()" class="neon-button">HUMANIZAR AGORA</button>
                </div>
            </div>

            <div id="supportSection" class="mode-section">
                <div class="input-card">
                    <div id="supportMessages" class="chat-messages" style="height:200px; overflow-y:auto; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;"></div>
                    <div class="chat-input-area" style="margin-top:10px; display:flex; gap:10px;">
                        <input type="text" id="supportInput" placeholder="Sua dúvida..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #334155; color:white; padding:10px; border-radius:5px;">
                        <button onclick="sendSupport()" class="neon-button-small">ENVIAR</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL SETTINGS -->
    <div id="v2SettingsModal" class="lock-overlay hidden" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
        <div class="lock-content" style="background:#0f172a; padding:30px; border-radius:15px; border:1px solid #7c3aed; text-align:center;">
            <h2 class="neon-text">PERFIL V2</h2>
            <p id="modalUserId" style="color:#a78bfa; font-weight:bold;"></p>
            <button onclick="closeSettings()" class="neon-button-small" style="margin-top:20px;">FECHAR</button>
        </div>
    </div>

    <!-- LÓGICA V2 CONSOLIDADA (INDEPENDENTE) -->
    <script>
        // 1. Controle de Navegação
        function switchV2(mode, btn) {
            document.querySelectorAll('.mode-section').forEach(s => s.classList.remove('active-v2'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const target = document.getElementById(mode + 'Section');
            if(target) target.classList.add('active-v2');
            if(btn) btn.classList.add('active');
            console.log("Modo:", mode);
        }

        // 2. Sincronizador de Dados (Reset V3)
        function syncData() {
            const data = JSON.parse(localStorage.getItem('buckai_user_data_v3') || localStorage.getItem('buckai_user_data') || '{}');
            
            if (data.username) {
                document.getElementById('welcomeUser').innerHTML = `BEM-VINDO, ${data.username.toUpperCase()} <span class="id-badge-v2">${data.id || '#000000'}</span>`;
                document.getElementById('userCredits').textContent = data.isPremium ? "∞" : (data.credits || 0);
                if(data.isAdmin || data.username === 'buck__ai') document.getElementById('adminPanelBtn').classList.remove('hidden');
                document.getElementById('userInfo').style.display = 'flex';
            }

            // Stats Reais (Estáveis)
            document.getElementById('activeNow').textContent = '1';
            document.getElementById('totalScripts').textContent = '152';
            document.getElementById('totalClients').textContent = '89';
        }

        // 3. Funções de UI
        function openSettings() {
            const data = JSON.parse(localStorage.getItem('buckai_user_data_v3') || '{}');
            document.getElementById('modalUserId').textContent = "ID: " + (data.id || "#000000");
            document.getElementById('v2SettingsModal').style.display = 'flex';
        }
        function closeSettings() { document.getElementById('v2SettingsModal').style.display = 'none'; }
        function notImplemented() { alert("Funcionalidade conectada à API V2. Aguarde processamento."); }

        // 4. Suporte Simulado V2
        function sendSupport() {
            const input = document.getElementById('supportInput');
            if(!input.value) return;
            const msg = document.createElement('div');
            msg.style.padding = '5px';
            msg.innerHTML = `<strong>Você:</strong> ${input.value}`;
            document.getElementById('supportMessages').appendChild(msg);
            input.value = '';
            setTimeout(() => {
                const reply = document.createElement('div');
                reply.style.padding = '5px'; reply.style.color = '#a78bfa';
                reply.innerHTML = `<strong>BuckAI:</strong> Suporte v2 ativo. Aguarde...`;
                document.getElementById('supportMessages').appendChild(reply);
            }, 1000);
        }

        // Loop de Segurança
        setInterval(syncData, 1000);
        window.onload = syncData;
    </script>
</body>
</html>
