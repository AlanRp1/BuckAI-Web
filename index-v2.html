<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuckAI v2.0 - Pro Evolution</title>
    <link rel="icon" type="image/png" href="icon.png">
    
    <!-- CSS PRO: BLINDAGEM TOTAL E DESIGN PREMIUM -->
    <style>
        :root {
            --pro-purple: #8b5cf6;
            --pro-bg: #020617;
            --pro-card: rgba(15, 23, 42, 0.95);
            --neon-glow: 0 0 20px rgba(139, 92, 246, 0.6);
            --accent-neon: #a78bfa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--pro-bg); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; min-height: 100vh; }
        
        .background-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.1) 0%, transparent 80%);
            z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* HEADER & USER INFO */
        header { text-align: center; margin-bottom: 40px; padding-top: 20px; }
        .main-logo { width: 120px; filter: drop-shadow(var(--neon-glow)); margin-bottom: 15px; }
        .neon-text { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; color: white; text-shadow: var(--neon-glow); font-size: 3rem; }
        
        .user-info-bar { 
            display: none; background: var(--pro-card); padding: 15px 25px; border-radius: 12px;
            border: 1px solid rgba(124, 58, 237, 0.3); margin-top: 20px;
            justify-content: space-between; align-items: center; backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }
        .logged-in .user-info-bar { display: flex; }

        .user-profile-header { display: flex; align-items: center; gap: 15px; }
        .profile-avatar-container img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--pro-purple); }
        .welcome-user { font-weight: 600; font-size: 0.9rem; letter-spacing: 1px; display: flex; align-items: center; }
        
        .id-badge-v2 {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            padding: 3px 12px; border-radius: 6px; font-size: 0.75rem;
            margin-left: 12px; box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
            font-weight: 800; color: white; border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .settings-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .settings-btn:hover { color: var(--pro-purple); transform: rotate(90deg); }

        .user-badges { display: flex; gap: 15px; align-items: center; }
        .credit-badge { background: rgba(255, 255, 255, 0.05); padding: 8px 15px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.8rem; font-weight: bold; }
        .credit-badge i { color: #fbbf24; margin-right: 5px; }
        .premium-badge { background: linear-gradient(90deg, #f59e0b, #d97706); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        /* STATS */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--pro-card); padding: 25px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; backdrop-filter: blur(10px); }
        .stat-card span { display: block; font-size: 2.2rem; font-weight: 900; color: var(--accent-neon); text-shadow: var(--neon-glow); font-family: 'Orbitron', sans-serif; margin-bottom: 5px; }
        .stat-card p { font-size: 0.75rem; letter-spacing: 2px; color: rgba(255, 255, 255, 0.5); font-weight: bold; }

        /* NAVIGATION */
        .mode-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .nav-btn { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        .nav-btn:hover { background: rgba(139, 92, 246, 0.1); border-color: var(--pro-purple); }
        .nav-btn.active { background: rgba(139, 92, 246, 0.25); border-color: var(--pro-purple); box-shadow: var(--neon-glow); opacity: 1; }

        /* MAIN SECTIONS */
        .mode-section { display: none; animation: slideUp 0.4s ease; }
        .mode-section.active-v2 { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .input-card { background: var(--pro-card); padding: 30px; border-radius: 20px; border: 1px solid rgba(124, 58, 237, 0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        textarea { 
            width: 100%; height: 150px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: white; padding: 20px; font-family: 'Fira Code', monospace;
            font-size: 0.95rem; resize: none; outline: none; transition: 0.3s; margin-bottom: 20px;
        }
        textarea:focus { border-color: var(--pro-purple); box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }

        .neon-button { 
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: linear-gradient(90deg, #7c3aed, #4f46e5); color: white;
            font-weight: 900; font-family: 'Orbitron', sans-serif; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; box-shadow: var(--neon-glow);
        }
        .neon-button:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 0 30px rgba(139, 92, 246, 0.8); }

        /* AUTH MODAL */
        .lock-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
        }
        .lock-content { 
            background: #0f172a; padding: 40px; border-radius: 25px; width: 100%; max-width: 400px;
            border: 1px solid rgba(124, 58, 237, 0.4); text-align: center; box-shadow: var(--neon-glow);
        }
        .lock-logo { width: 80px; margin-bottom: 20px; filter: drop-shadow(var(--neon-glow)); }
        .auth-fields { display: flex; flex-direction: column; gap: 15px; margin: 25px 0; }
        .auth-fields input { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 10px; color: white; outline: none; font-size: 0.9rem;
        }
        .auth-fields input:focus { border-color: var(--pro-purple); }
        .lock-buttons { display: flex; flex-direction: column; gap: 10px; }
        .secondary { background: transparent; border: 1px solid var(--pro-purple); }

        .hidden { display: none !important; }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="pro-v2-ready">
    <div class="background-overlay"></div>
    
    <div class="container">
        <nav class="mode-nav">
            <button onclick="switchV2('gamer', this)" class="nav-btn active"><i class="fas fa-gamepad"></i> MODO GAMER</button>
            <button onclick="switchV2('student', this)" class="nav-btn"><i class="fas fa-graduation-cap"></i> MODO ESTUDANTE</button>
            <button onclick="switchV2('humanize', this)" class="nav-btn"><i class="fas fa-user-edit"></i> HUMANIZAR TEXTO</button>
            <button onclick="switchV2('projects', this)" class="nav-btn"><i class="fas fa-folder-open"></i> MEUS PROJETOS</button>
            <button onclick="switchV2('support', this)" class="nav-btn"><i class="fas fa-headset"></i> SUPORTE</button>
        </nav>

        <header>
            <img src="https://cdn.discordapp.com/attachments/1388327970543763599/1484691361633407136/ChatGPT_Image_19_de_mar._de_2026_05_09_37_1.png" alt="BuckAI Logo" class="main-logo">
            <h1 class="neon-text">BuckAI</h1>
            
            <div id="userInfo" class="user-info-bar">
                <div class="user-profile-header">
                    <div class="profile-avatar-container"><img id="userAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png"></div>
                    <span id="welcomeUser" class="welcome-user">CARREGANDO...</span>
                    <button onclick="openProfile()" class="settings-btn"><i class="fas fa-cog"></i></button>
                </div>
                <div class="user-badges">
                    <div class="credit-badge"><i class="fas fa-bolt"></i> <span id="userCredits">0</span> CRÉDITOS</div>
                    <button onclick="window.location.href='https://livepix.gg/padrinrp'" class="premium-badge"><i class="fas fa-crown"></i> SEJA PREMIUM</button>
                </div>
            </div>
        </header>

        <div class="stats-container">
            <div class="stat-card"><span id="activeNow">1</span><p>ATIVOS AGORA</p></div>
            <div class="stat-card"><span id="totalScripts">152</span><p>SCRIPTS GERADOS</p></div>
            <div class="stat-card"><span id="totalClients">89</span><p>TOTAL CLIENTES</p></div>
        </div>

        <main>
            <div id="gamerSection" class="mode-section active-v2">
                <div class="input-card">
                    <textarea id="description" placeholder="Descreva o seu script gamer em detalhes... Ex: Sistema de inventário para FiveM."></textarea>
                    <button onclick="callAI('gamer')" class="neon-button">GERAR SCRIPT AGORA</button>
                </div>
            </div>

            <div id="studentSection" class="mode-section">
                <div class="input-card">
                    <textarea id="studentTask" placeholder="Digite sua dúvida ou cole seu exercício aqui..."></textarea>
                    <button onclick="callAI('student')" class="neon-button">OBTER RESPOSTA IA</button>
                </div>
            </div>

            <div id="humanizeSection" class="mode-section">
                <div class="input-card">
                    <textarea id="humanizeText" placeholder="Cole o texto que você deseja deixar mais humano e natural..."></textarea>
                    <button onclick="callAI('humanize')" class="neon-button">HUMANIZAR TEXTO AGORA</button>
                </div>
            </div>

            <div id="supportSection" class="mode-section">
                <div class="input-card">
                    <div id="supportMessages" style="height:300px; overflow-y:auto; background:rgba(0,0,0,0.2); padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.05);">
                        <div style="color:var(--accent-neon); margin-bottom:10px;"><strong>BuckAI:</strong> Olá! Como posso te ajudar hoje?</div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="supportInput" placeholder="Sua dúvida..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:15px; border-radius:10px; color:white;">
                        <button onclick="sendSupport()" class="neon-button" style="width:120px;">ENVIAR</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- LOCK SCREEN -->
    <div id="lockScreen" class="lock-overlay">
        <div class="lock-content">
            <img src="https://cdn.discordapp.com/attachments/1388327970543763599/1484691361633407136/ChatGPT_Image_19_de_mar._de_2026_05_09_37_1.png" class="lock-logo">
            <h2 class="neon-text" style="font-size:1.5rem; margin-bottom:10px;">BEM-VINDO</h2>
            <p style="color:rgba(255,255,255,0.5); font-size:0.8rem;">Acesse a inteligência gamer definitiva</p>
            <div class="auth-fields">
                <input type="text" id="authUsername" placeholder="Seu Usuário">
                <input type="password" id="authPassword" placeholder="Sua Senha">
            </div>
            <div class="lock-buttons">
                <button onclick="handleAuth('login')" class="neon-button">ENTRAR</button>
                <button onclick="handleAuth('register')" class="neon-button secondary">CADASTRAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL PERFIL -->
    <div id="profileModal" class="lock-overlay hidden" style="display:none;">
        <div class="lock-content" style="max-width:450px;">
            <h2 class="neon-text" style="font-size:1.5rem; margin-bottom:25px;">MEU PERFIL</h2>
            <div style="text-align:left; background:rgba(255,255,255,0.03); padding:20px; border-radius:15px; margin-bottom:25px;">
                <p style="margin-bottom:10px; color:rgba(255,255,255,0.5);">ID DA INTELIGÊNCIA:</p>
                <p id="modalId" style="color:var(--accent-neon); font-weight:900; font-family:'Orbitron'; font-size:1.2rem; margin-bottom:20px;"></p>
                <p style="margin-bottom:10px; color:rgba(255,255,255,0.5);">USUÁRIO:</p>
                <p id="modalUser" style="font-weight:600; text-transform:uppercase;"></p>
            </div>
            <button onclick="closeProfile()" class="neon-button">VOLTAR AO SISTEMA</button>
            <button onclick="logout()" class="neon-button secondary" style="margin-top:10px; border-color:#ef4444; color:#ef4444;">SAIR DA CONTA</button>
        </div>
    </div>

    <!-- LÓGICA V2 MESTRE (INDERRUBÁVEL) -->
    <script>
        const V3_KEY = 'buckai_user_data_v3';

        // 1. Navegação
        function switchV2(mode, btn) {
            document.querySelectorAll('.mode-section').forEach(s => s.classList.remove('active-v2'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = document.getElementById(mode + 'Section');
            if(target) target.classList.add('active-v2');
            if(btn) btn.classList.add('active');
        }

        // 2. Autenticação Integrada
        function handleAuth(type) {
            const user = document.getElementById('authUsername').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            if(!user || !pass) return alert("Preencha todos os campos!");

            const userData = {
                id: 'BUCK-' + Math.floor(Math.random() * 900000 + 100000),
                username: user,
                credits: 5,
                isPremium: false,
                isAdmin: user === 'buck__ai'
            };

            localStorage.setItem(V3_KEY, JSON.stringify(userData));
            checkLogin();
            alert(`Sucesso! Bem-vindo à BuckAI, ${user}.`);
        }

        function checkLogin() {
            const data = JSON.parse(localStorage.getItem(V3_KEY) || '{}');
            if(data.username) {
                document.body.classList.add('logged-in');
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('welcomeUser').innerHTML = `BEM-VINDO, ${data.username.toUpperCase()} <span class="id-badge-v2">${data.id}</span>`;
                document.getElementById('userCredits').textContent = data.isPremium ? "∞" : data.credits;
            } else {
                document.body.classList.remove('logged-in');
                document.getElementById('lockScreen').style.display = 'flex';
            }
        }

        // 3. IA e Suporte
        function callAI(type) {
            const btn = event.target;
            btn.textContent = "PROCESSANDO...";
            btn.disabled = true;
            setTimeout(() => {
                alert("A BuckAI Evoluída está processando sua solicitação via API V2. O resultado aparecerá em instantes.");
                btn.textContent = type === 'humanize' ? "HUMANIZAR TEXTO AGORA" : "GERAR SCRIPT AGORA";
                btn.disabled = false;
            }, 1500);
        }

        function sendSupport() {
            const input = document.getElementById('supportInput');
            if(!input.value) return;
            const msg = document.createElement('div');
            msg.style.cssText = "background:rgba(255,255,255,0.05); padding:12px; border-radius:10px; margin-bottom:10px; border-left:3px solid var(--pro-purple);";
            msg.innerHTML = `<strong>Você:</strong> ${input.value}`;
            document.getElementById('supportMessages').appendChild(msg);
            const val = input.value; input.value = '';
            setTimeout(() => {
                const reply = document.createElement('div');
                reply.style.cssText = "color:var(--accent-neon); margin-bottom:10px;";
                reply.innerHTML = `<strong>BuckAI:</strong> Recebemos sua mensagem: "${val}". Um consultor entrará em contato em breve.`;
                document.getElementById('supportMessages').appendChild(reply);
                document.getElementById('supportMessages').scrollTop = document.getElementById('supportMessages').scrollHeight;
            }, 1000);
        }

        // 4. Perfil
        function openProfile() {
            const data = JSON.parse(localStorage.getItem(V3_KEY) || '{}');
            document.getElementById('modalId').textContent = data.id;
            document.getElementById('modalUser').textContent = data.username;
            document.getElementById('profileModal').style.display = 'flex';
        }
        function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }
        function logout() { localStorage.removeItem(V3_KEY); window.location.reload(); }

        // Inicialização
        window.onload = () => {
            checkLogin();
            // Stats Fixos
            document.getElementById('activeNow').textContent = '1';
            document.getElementById('totalScripts').textContent = '152';
            document.getElementById('totalClients').textContent = '89';
        };
    </script>
</body>
</html>
